<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incredible India Fair - Coming Soon</title>
    <meta name="description"
        content="Experience the rich culture and heritage at the Incredible India Fair. Coming soon!">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-overlay"></div>
    <main class="container">
        <div class="glass-card">

                <button type="submit" class="notify-btn">Notify Me</button>

            <p class="form-message" id="form-message"></p>
        </div>

    <script src="script.js"></script>
