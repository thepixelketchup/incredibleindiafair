<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Incredible India Fair (Leoff Edition)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="nav-link" style="font-size: 1.2rem; margin-right: auto;">INCREDIBLE INDIA FAIR</a>
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">Our Story</a>
        <a href="experiences.html" class="nav-link">Experiences</a>
        <a href="visit.html" class="nav-link">Plan Visit</a>
        <a href="exhibit.html" class="nav-link">Exhibit</a>
        <a href="contact.html" class="nav-link" style="background: var(--clr-red); color: white; padding: 0.5rem 1.5rem; border-radius: 50px;">Contact</a>
    </nav>

    <!-- Subpage Hero -->
    <section class="section bg-pink" style="padding-top: 12rem; text-align: center; color: white;">
        <div class="container">
            <h1 style="font-size: clamp(3rem, 8vw, 6rem);" class="reveal-text"><span>GET IN TOUCH</span></h1>
            <p style="font-size: 1.8rem; font-weight: 700; margin-top: 1rem;" class="reveal-text"><span>Have questions? We’d love to hear from you.</span></p>
        </div>
        <div class="wave-divider">
            <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
                <path fill="#FFDE59" fill-opacity="1" d="M0,224L60,208C120,192,240,160,360,165.3C480,171,600,213,720,213.3C840,213,960,171,1080,154.7C1200,139,1320,149,1380,154.7L1440,160L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
            </svg>
        </div>
    </section>

    <!-- Contact Content -->
    <section class="section bg-yellow" style="padding-top: 5rem;">
        <div class="container grid grid-cols-2" style="gap: 6rem;">
            <div>
                <h2 style="font-size: 4rem; margin-bottom: 3rem; color: var(--clr-red);" class="reveal-text"><span>Say Hello</span></h2>
                
                <div style="margin-bottom: 4rem;">
                    <div class="image-slant" style="background: white; padding: 2.5rem; border-radius: 30px; margin-bottom: 2rem;">
                        <h4 style="color: var(--clr-teal); text-transform: uppercase; margin-bottom: 1rem;">EMAIL</h4>
                        <p style="font-size: 1.8rem; font-weight: 800;">info@incredibleindiafair.com</p>
                    </div>
                    <div class="image-slant" style="background: var(--clr-teal); color: white; padding: 2.5rem; border-radius: 30px; margin-bottom: 2rem;">
                        <h4 style="color: var(--clr-yellow); text-transform: uppercase; margin-bottom: 1rem;">PRESS</h4>
                        <p style="font-size: 1.8rem; font-weight: 800;">press@incredibleindiafair.com</p>
                    </div>
                </div>
                
                <div class="image-slant" style="background: var(--clr-blue); color: white; padding: 2.5rem; border-radius: 30px;">
                    <h4 style="color: var(--clr-pink); text-transform: uppercase; margin-bottom: 1rem;">LOCATION</h4>
                    <p style="font-size: 1.5rem; font-weight: 700;">Amsterdam, The Netherlands</p>
                </div>
            </div>
            
            <div class="image-slant" style="background: white; padding: 5rem 4rem; border-radius: 60px; border: 5px solid var(--clr-dark);">
                <form style="display: grid; gap: 2rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <label style="font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: var(--clr-red);">Full Name</label>
                        <input type="text" style="padding: 1.2rem; background: #f9f9f9; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 1.1rem;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <label style="font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: var(--clr-red);">Email Address</label>
                        <input type="email" style="padding: 1.2rem; background: #f9f9f9; border: 2px solid #eee; border-radius: 15px; outline: none; font-size: 1.1rem;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                        <label style="font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: var(--clr-red);">Message</label>
                        <textarea style="padding: 1.2rem; background: #f9f9f9; border: 2px solid #eee; border-radius: 15px; outline: none; height: 150px; font-size: 1.1rem;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark" style="margin-top: 1rem; border-radius: 100px; padding: 1.5rem;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer style="background: var(--clr-dark); color: white; padding: 6rem 2rem; text-align: center;">
        <p style="opacity: 0.5;">&copy; 2026 Incredible India Fair Amsterdam.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
